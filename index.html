<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Route | Shortest Path AI</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="map"></div>

    <!-- Tombol Toggle Mode Peta -->
    <button id="mapStyleBtn" class="map-style-btn" title="Ubah ke Mode 2D">
        <i class="fas fa-map"></i>
    </button>

    <aside class="sidebar-container">
        <!-- Brand Header (Selalu terlihat) -->
        <div class="brand">
            <div class="brand-title-group">
                <i class="fas fa-route"></i>
                <div>
                    <h1>Shortest Route</h1>
                    <p>AI Shortest Path System</p>
                </div>
            </div>
            <button id="soundToggleBtn" class="sound-toggle-btn" title="Aktifkan Suara">
                <i class="fas fa-volume-mute"></i>
            </button>
        </div>

        <!-- Konten Sidebar dengan view terpisah -->
        <div class="sidebar-content-wrapper">
            <!-- View 1: Navigasi Rute -->
            <div id="navPanel" class="sidebar-view active">
                <div class="search-box">
                    <div class="search-group horizontal">
                        <div class="input-wrapper">
                            <i class="fas fa-location-dot start-icon"></i>
                            <select id="startNode" class="search-select">
                                <option value="" disabled>Pilih Lokasi Awal...</option>
                            </select>
                        </div>

                        <i class="fas fa-arrow-right route-arrow"></i>

                        <div class="input-wrapper">
                            <i class="fas fa-map-pin end-icon"></i>
                            <select id="endNode" class="search-select">
                                <option value="" disabled>Pilih Tujuan...</option>
                            </select>
                        </div>
                    </div>

                    <div class="controls-wrapper">
                        <div class="control-group">
                            <label><i class="fas fa-person-walking"></i> Mode Transportasi</label>
                            <div class="mode-selector">
                                <button class="mode-btn active" data-mode="walking" title="Jalan Kaki"><i
                                        class="fas fa-person-walking"></i></button>
                                <button class="mode-btn" data-mode="motorcycle" title="Naik Motor"><i
                                        class="fas fa-motorcycle"></i></button>
                                <button class="mode-btn" data-mode="car" title="Naik Mobil"><i
                                        class="fas fa-car"></i></button>
                                <input type="hidden" id="travelMode" value="walking">
                            </div>
                        </div>

                        <div class="control-group">
                            <label><i class="fas fa-route"></i> Mode Pencarian Rute</label>
                            <div class="route-mode-toggle">
                                <button class="route-mode-btn active" id="btnRealRoad" onclick="setRouteMode('real')">
                                    <i class="fas fa-road"></i> Ikuti Jalan
                                </button>
                                <button class="route-mode-btn" id="btnDirect" onclick="setRouteMode('direct')">
                                    <i class="fas fa-location-arrow"></i> Langsung
                                </button>
                            </div>
                        </div>

                        <button id="findPathBtn" class="primary-btn">
                            <span>Cari Rute</span>
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <div id="resultsCard" class="results-card hidden">
                    <div class="results-stats-row">
                        <div class="result-stat">
                            <span class="label">Jarak</span>
                            <span id="totalDistance" class="value">-</span>
                        </div>
                        <div class="result-stat">
                            <span class="label">Waktu</span>
                            <span id="estimatedTime" class="value">-</span>
                        </div>
                    </div>
                    <div class="path-details">
                        <p id="pathText"></p>
                    </div>
                </div>

                <div class="legend">
                    <h3>Legenda</h3>
                    <div class="legend-item"><span class="marker-dot building"></span> Gedung UNIB</div>
                    <div class="legend-item"><span class="marker-dot path"></span> Jalur Rute</div>
                </div>
            </div>

            <!-- View 2: Detail Gedung -->
            <div id="infoPanel" class="sidebar-view hidden">
                <div class="info-header">
                    <button id="closeInfoBtn" class="back-btn" title="Kembali ke Navigasi">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </button>
                </div>
                <div id="infoContent">
                    <!-- Diisi dinamis oleh JS -->
                </div>
                <div class="info-actions">
                    <button id="setDestinationBtn" class="action-btn primary">
                        <i class="fas fa-directions"></i> Rute ke Sini
                    </button>
                    <button class="action-btn" id="shareBtn"><i class="fas fa-share-alt"></i> Bagikan</button>
                </div>
            </div>
        </div>
    </aside>

    <footer class="credits-panel">
        UAS AI Project - Universitas Bengkulu
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>
</body>

</html>
